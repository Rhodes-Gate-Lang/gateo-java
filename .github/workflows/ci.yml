name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-schema-pin:
    runs-on: ubuntu-latest
    env:
      SCHEMA_URL: https://github.com/Rhodes-Gate-Lang/gateo-schema/releases/download/v2.0.1/gateo-schema-v2.0.1.zip
      SCHEMA_SHA256: d96f18d7abfaa49542667ed9175fc2e295b72ae08278c66ad05a5d57a039344f
    steps:
      - uses: actions/checkout@v4
      - name: Verify pinned schema zip checksum
        run: |
          set -euo pipefail
          curl -fsSL "$SCHEMA_URL" -o gateo-schema.zip
          ACTUAL="$(sha256sum gateo-schema.zip | awk '{print $1}')"
          if [ "$ACTUAL" != "$SCHEMA_SHA256" ]; then
            echo "Checksum mismatch for gateo-schema-v2.0.1.zip"
            echo "expected=$SCHEMA_SHA256"
            echo "actual=$ACTUAL"
            exit 1
          fi

  build:
    needs: verify-schema-pin
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ["17", "21"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Build and test
        run: ./gradlew build --no-daemon
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.java-version }}
          path: build/reports/tests/
